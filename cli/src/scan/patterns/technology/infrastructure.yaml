layer: technology
framework: infrastructure
version: "1.0"
patterns:
  - id: technology.kubernetes-deployment
    produces:
      type: node
      layer: technology
      elementType: kubernetes-deployment
    query:
      tool: search_code
      params:
        pattern: "kind:\\s*Deployment.*?metadata:.*?name:\\s*([^\\n]+)"
        language: yaml
    confidence: 0.9
    mapping:
      id: "technology.kubernetes-deployment.{match.deploymentName|kebab}"
      name: "{match.deploymentName}"

  - id: technology.kubernetes-service
    produces:
      type: node
      layer: technology
      elementType: kubernetes-service
    query:
      tool: search_code
      params:
        pattern: "kind:\\s*Service.*?metadata:.*?name:\\s*([^\\n]+)"
        language: yaml
    confidence: 0.9
    mapping:
      id: "technology.kubernetes-service.{match.serviceName|kebab}"
      name: "{match.serviceName}"

  - id: technology.docker-image
    produces:
      type: node
      layer: technology
      elementType: docker-image
    query:
      tool: search_code
      params:
        pattern: "FROM\\s+([^\\s]+)"
        language: dockerfile
    confidence: 0.85
    mapping:
      id: "technology.docker-image.{match.imageName|kebab}"
      name: "{match.imageName}"

  - id: technology.terraform-resource
    produces:
      type: node
      layer: technology
      elementType: terraform-resource
    query:
      tool: search_code
      params:
        pattern: "resource\\s+\"([^\"]+)\"\\s+\"([^\"]+)\""
        language: hcl
    confidence: 0.9
    mapping:
      id: "technology.terraform-resource.{match.resourceName|kebab}"
      name: "{match.resourceName}"

  - id: technology.vpc
    produces:
      type: node
      layer: technology
      elementType: vpc
    query:
      tool: search_code
      params:
        pattern: "(?:vpc|virtual.?private.?cloud).*?name[:=]\\s*[\"\\'']?([^\\n\"\\''\\s]+)"
        language: hcl
    confidence: 0.8
    mapping:
      id: "technology.vpc.{match.vpcName|kebab}"
      name: "{match.vpcName}"

  - id: technology.database-instance
    produces:
      type: node
      layer: technology
      elementType: database
    query:
      tool: search_code
      params:
        pattern: "(?:db_instance|RDS|database).*?identifier[:=]\\s*[\"\\'']?([^\\n\"\\''\\s]+)"
        language: hcl
    confidence: 0.85
    mapping:
      id: "technology.database.{match.dbName|kebab}"
      name: "{match.dbName}"

  - id: technology.deployment.exposed-by-service
    produces:
      type: relationship
      layer: technology
      elementType: deployment-service
      relationshipType: exposed-by
    query:
      tool: search_code
      params:
        pattern: "kind:\\s*(?:Deployment|StatefulSet).*?kind:\\s*Service"
        language: yaml
    confidence: 0.9
    mapping:
      source: "technology.kubernetes-deployment.*"
      target: "technology.kubernetes-service.*"

  - id: technology.deployment.uses-image
    produces:
      type: relationship
      layer: technology
      elementType: deployment-image
      relationshipType: uses
    query:
      tool: search_code
      params:
        pattern: "image:\\s*([^\\n]+)"
        language: yaml
    confidence: 0.85
    mapping:
      source: "technology.kubernetes-deployment.*"
      target: "technology.docker-image.*"

  - id: technology.terraform.depends-on
    produces:
      type: relationship
      layer: technology
      elementType: terraform-dependency
      relationshipType: depends-on
    query:
      tool: search_code
      params:
        pattern: "depends_on\\s*=\\s*\\[(.*?)\\]"
        language: hcl
    confidence: 0.95
    mapping:
      source: "technology.terraform-resource.*"
      target: "technology.terraform-resource.*"

  - id: technology.service.deployed-in-vpc
    produces:
      type: relationship
      layer: technology
      elementType: service-vpc
      relationshipType: deployed-in
    query:
      tool: search_code
      params:
        pattern: "vpc_id\\s*=\\s*([^\\n]+)|vpcId:\\s*([^\\n]+)"
        language: all
    confidence: 0.7
    mapping:
      source: "technology.kubernetes-service.*"
      target: "technology.vpc.*"
