# Cross-Layer Dependency Patterns (API → Application)
# Semantic patterns that bridge multiple layers using multi-pass pattern execution
# These patterns use depends_on to reference discovered elements from prior passes
layer: api
framework: cross-layer
version: "1.0"
patterns:
  # Cross-layer pattern: Discover which application services are called by API endpoints
  # Uses depends_on to require api.endpoint handler discovery from prior pass
  # Creates one relationship per (endpoint, service) pair returned by find_dependencies
  # The find_dependencies tool returns {source, target} pairs for each dependency found
  - id: api.to.application.dependencies
    produces:
      type: relationship
      layer: api
      elementType: dependency
      relationshipType: depends-on
    query:
      tool: find_dependencies
      params:
        framework: express
        language: javascript
        scope: handler-body
        targetLayers: [application]
        searchTypes: [service, controller, component]
    requires_index: true
    depends_on:
      - express.route.handler
      - nestjs.service.injectable
    confidence: 0.75
    mapping:
      # Source and target are populated from find_dependencies result fields
      # find_dependencies returns {source, target} pairs — one relationship per pair
      source: "api.endpoint.{match.source|kebab}"
      target: "application.service.{match.target|kebab}"
