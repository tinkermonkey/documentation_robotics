# Express.js API Layer Patterns
# Semantic pattern evolution using CodePrism's analyze_api_surface tool
# This replaces regex-based route discovery with semantic AST analysis
layer: api
framework: express
version: "2.0"
patterns:
  # Semantic pattern: Discover Express routes using AST analysis
  - id: express.route.handler
    produces:
      type: node
      layer: api
      elementType: endpoint
    query:
      tool: analyze_api_surface
      params:
        framework: express
        language: javascript
    requires_index: true
    confidence: 0.95
    mapping:
      id: "api.endpoint.{match.path|kebab}"
      name: "{match.path}"
      description: "{match.method|upper} {match.path}"

  # Regex fallback for when index is not available
  - id: express.route.handler.regex
    produces:
      type: node
      layer: api
      elementType: endpoint
    query:
      tool: search_code
      params:
        pattern: "(app|router)\\.(get|post|put|delete|patch|options|head)\\(['\"]([^'\"]+)['\"]"
        language: javascript
    confidence: 0.75
    mapping:
      id: "api.endpoint.{match.path|kebab}"
      name: "{match.path}"

  # Middleware usage patterns (semantic preferred)
  - id: express.middleware.usage
    produces:
      type: relationship
      layer: api
      elementType: middleware-usage
      relationshipType: applies-to
    query:
      tool: analyze_api_surface
      params:
        framework: express
        language: javascript
        includeMiddleware: true
    requires_index: true
    confidence: 0.9
    mapping:
      source: "api.middleware.{match.middlewareName|kebab}"
      target: "api.endpoint.*"

  # Regex fallback for middleware
  - id: express.middleware.usage.regex
    produces:
      type: relationship
      layer: api
      elementType: middleware-usage
      relationshipType: applies-to
    query:
      tool: search_code
      params:
        pattern: "(app|router)\\.use\\(([^)]+)\\)"
        language: javascript
    confidence: 0.65
    mapping:
      source: "api.middleware.{match.middlewareName|kebab}"
      target: "api.endpoint.*"

  # Regex pattern: Detect error handler middleware (catch-all error handlers)
  - id: express.error.handler
    produces:
      type: node
      layer: api
      elementType: middleware
    query:
      tool: search_code
      params:
        pattern: "app\\.use\\(\\s*\\(\\s*err\\s*,\\s*req\\s*,\\s*res\\s*,\\s*next\\s*\\)"
        language: javascript
    confidence: 0.7
    mapping:
      id: "api.middleware.error-handler"
      name: "Error Handler Middleware"
      description: "Express error handling middleware"
