# Jest Testing Layer Patterns
layer: testing
framework: jest
version: "1.0"
patterns:
  - id: jest.suite.describe
    produces:
      type: node
      layer: testing
      elementType: test-suite
    query:
      tool: search_code
      params:
        pattern: "describe\\s*\\(\\s*['\"]([^'\"]+)['\"]\\s*,\\s*\\(\\)\\s*=>\\s*\\{?"
        language: typescript
    confidence: 0.95
    mapping:
      id: "testing.test-suite.{match.suiteName|kebab}"
      name: "{match.suiteName}"
  - id: jest.test.case
    produces:
      type: node
      layer: testing
      elementType: test-case
    query:
      tool: search_code
      params:
        pattern: "(test|it)\\s*\\(\\s*['\"]([^'\"]+)['\"]\\s*,\\s*\\(\\)\\s*=>\\s*\\{?"
        language: typescript
    confidence: 0.95
    mapping:
      id: "testing.test-case.{match.testName|kebab}"
      name: "{match.testName}"
  - id: jest.test.assertion
    produces:
      type: relationship
      layer: testing
      elementType: assertion
      relationshipType: validates
    query:
      tool: search_code
      params:
        pattern: "expect\\s*\\([^)]+\\)\\.(toBe|toEqual|toThrow|toContain)"
        language: typescript
    confidence: 0.8
    mapping:
      source: "testing.test-case.{match.testName|kebab}"
      target: "testing.assertion.{match.assertionType|kebab}"
  - id: jest.test.mock
    produces:
      type: relationship
      layer: testing
      elementType: mock
      relationshipType: mocks
    query:
      tool: search_code
      params:
        pattern: "jest\\.(mock|spyOn)\\s*\\(\\s*['\"]?([^'\"\\)]+)['\"]?"
        language: typescript
    confidence: 0.85
    mapping:
      source: "testing.test-case.{match.testName|kebab}"
      target: "testing.mock.{match.mockedModule|kebab}"
