name: ArchiMate Goals and Requirements
description: Detects goals, requirements, and constraints in code comments and issue trackers
version: '1.0'
patterns:
  - id: goal-definition
    selector: 'goal_definition'
    description: 'Identifies business goals in comments'
    regex: '(?:goal|objective|outcome):\s*([^#\n]+)'
    captures:
      - name: goal_name
        group: 1
    template: 'motivation.goal.{kebab(goal_name)}'

  - id: requirement-definition
    selector: 'requirement_definition'
    description: 'Identifies functional and non-functional requirements'
    regex: '(?:requirement|req|spec):\s*(?:FR|NFR)?\s*([^#\n]+)'
    captures:
      - name: req_name
        group: 1
    template: 'motivation.requirement.{kebab(req_name)}'

  - id: constraint-definition
    selector: 'constraint_definition'
    description: 'Identifies architectural constraints'
    regex: '(?:constraint|must|shall|required):\s*([^#\n]+)'
    captures:
      - name: constraint_name
        group: 1
    template: 'motivation.constraint.{kebab(constraint_name)}'

  - id: stakeholder-identification
    selector: 'stakeholder'
    description: 'Identifies stakeholders and roles'
    regex: 'stakeholder:\s*([^#\n]+)'
    captures:
      - name: stakeholder_name
        group: 1
    template: 'motivation.stakeholder.{kebab(stakeholder_name)}'

relationships:
  - id: goal-requirement-relationship
    source: 'goal_definition'
    target: 'requirement_definition'
    type: 'realizes'
    condition: 'same_section'
    confidence: 0.8

  - id: stakeholder-goal-relationship
    source: 'stakeholder'
    target: 'goal_definition'
    type: 'concerned-with'
    condition: 'same_file'
    confidence: 0.6
