layer: motivation
framework: archimate-goals
version: "1.0"
patterns:
  - id: motivation.goal.definition
    produces:
      type: node
      layer: motivation
      elementType: goal
    query:
      tool: search_code
      params:
        pattern: "(?:goal|objective|outcome):\\s*([^#\\n]+)"
        language: all
    confidence: 0.8
    mapping:
      id: "motivation.goal.{match.goalName|kebab}"
      name: "{match.goalName}"

  - id: motivation.requirement.definition
    produces:
      type: node
      layer: motivation
      elementType: requirement
    query:
      tool: search_code
      params:
        pattern: "(?:requirement|req|spec):\\s*(?:FR|NFR)?\\s*([^#\\n]+)"
        language: all
    confidence: 0.75
    mapping:
      id: "motivation.requirement.{match.reqName|kebab}"
      name: "{match.reqName}"

  - id: motivation.constraint.definition
    produces:
      type: node
      layer: motivation
      elementType: constraint
    query:
      tool: search_code
      params:
        pattern: "(?:constraint|must|shall|required):\\s*([^#\\n]+)"
        language: all
    confidence: 0.8
    mapping:
      id: "motivation.constraint.{match.constraintName|kebab}"
      name: "{match.constraintName}"

  - id: motivation.stakeholder.identification
    produces:
      type: node
      layer: motivation
      elementType: stakeholder
    query:
      tool: search_code
      params:
        pattern: "stakeholder:\\s*([^#\\n]+)"
        language: all
    confidence: 0.7
    mapping:
      id: "motivation.stakeholder.{match.stakeholderName|kebab}"
      name: "{match.stakeholderName}"

  - id: motivation.goal.realizes-requirement
    produces:
      type: relationship
      layer: motivation
      elementType: goal-requirement
      relationshipType: realizes
    query:
      tool: search_code
      params:
        pattern: "(?:goal|objective).*?(?:requirement|req):\\s*([^#\\n]+)"
        language: all
    confidence: 0.8
    mapping:
      source: "motivation.goal.*"
      target: "motivation.requirement.*"

  - id: motivation.stakeholder.concerned-with-goal
    produces:
      type: relationship
      layer: motivation
      elementType: stakeholder-goal
      relationshipType: concerned-with
    query:
      tool: search_code
      params:
        pattern: "(?:stakeholder|actor).*?(?:goal|objective):\\s*([^#\\n]+)"
        language: all
    confidence: 0.6
    mapping:
      source: "motivation.stakeholder.*"
      target: "motivation.goal.*"
