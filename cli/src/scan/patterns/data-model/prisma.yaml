# Prisma Data Model Layer Patterns
# Phase 4: Semantic pattern evolution using CodePrism's find_dependencies
layer: data-model
framework: prisma
version: "2.0"
patterns:
  - id: prisma.model.definition
    produces:
      type: node
      layer: data-model
      elementType: entity
    query:
      tool: search_code
      params:
        pattern: "^\\s*model\\s+(\\w+)\\s*\\{"
        language: prisma
    confidence: 0.95
    mapping:
      id: "data-model.entity.{match.modelName|kebab}"
      name: "{match.modelName}"

  - id: prisma.model.field
    produces:
      type: relationship
      layer: data-model
      elementType: field
      relationshipType: has-property
    query:
      tool: search_code
      params:
        pattern: "^\\s*(\\w+)\\s+(\\w+)(\\s+@[a-z]+\\([^)]*\\))*"
        language: prisma
    confidence: 0.9
    mapping:
      source: "data-model.entity.{match.modelName|kebab}"
      target: "data-model.field.{match.fieldName|kebab}"

  # Semantic pattern: Discover entity relationships using find_dependencies
  - id: prisma.model.relation.semantic
    produces:
      type: relationship
      layer: data-model
      elementType: link
      relationshipType: references
    query:
      tool: find_dependencies
      params:
        framework: prisma
        language: prisma
        scope: relation
    requires_index: true
    depends_on: ["prisma.model.definition"]
    confidence: 0.93
    mapping:
      source: "data-model.entity.{match.source|kebab}"
      target: "data-model.entity.{match.target|kebab}"

  # Regex fallback for relations
  - id: prisma.model.relation
    produces:
      type: relationship
      layer: data-model
      elementType: link
      relationshipType: references
    query:
      tool: search_code
      params:
        pattern: "^\\s*(\\w+)\\s+(\\w+)\\s+@relation\\(name:\\s*['\"]([^'\"]+)['\"]"
        language: prisma
    confidence: 0.70
    mapping:
      source: "data-model.entity.{match.sourceModel|kebab}"
      target: "data-model.entity.{match.targetModel|kebab}"
