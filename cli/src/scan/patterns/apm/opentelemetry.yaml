# OpenTelemetry APM Layer Patterns
layer: apm
framework: opentelemetry
version: "1.0"
patterns:
  - id: otel.tracer.initialization
    produces:
      type: node
      layer: apm
      elementType: tracer
    query:
      tool: search_code
      params:
        pattern: "(getTracer|TracerProvider)\\s*\\(['\"]?([^'\"\\)]+)['\"]?"
        language: typescript
    confidence: 0.9
    mapping:
      id: "apm.tracer.{match.tracerName|kebab}"
      name: "{match.tracerName}"
  - id: otel.span.creation
    produces:
      type: relationship
      layer: apm
      elementType: span
      relationshipType: creates-span
    query:
      tool: search_code
      params:
        pattern: "startSpan\\s*\\(\\s*['\"]([^'\"]+)['\"]"
        language: typescript
    confidence: 0.85
    mapping:
      source: "{match.tracerName|kebab}"
      target: "{match.spanName|kebab}"
  - id: otel.metric.creation
    produces:
      type: node
      layer: apm
      elementType: metric
    query:
      tool: search_code
      params:
        pattern: "(createCounter|createHistogram|createObservableGauge)\\s*\\(\\s*['\"]([^'\"]+)['\"]"
        language: typescript
    confidence: 0.85
    mapping:
      id: "apm.metric.{match.metricName|kebab}"
      name: "{match.metricName}"
  - id: otel.instrumentation.setup
    produces:
      type: relationship
      layer: apm
      elementType: instrumentation
      relationshipType: instruments
    query:
      tool: search_code
      params:
        pattern: "registerInstrumentations\\s*\\(\\s*\\[([^\\]]+)\\]\\s*\\)"
        language: typescript
    confidence: 0.8
    mapping:
      source: "apm.instrumentation.auto"
      target: "{match.packageName|kebab}"
  - id: otel.exporter.configuration
    produces:
      type: node
      layer: apm
      elementType: exporter
    query:
      tool: search_code
      params:
        pattern: "new\\s+(OTLPTraceExporter|OTLPMetricExporter)\\s*\\(\\s*\\{"
        language: typescript
    confidence: 0.9
    mapping:
      id: "apm.exporter.{match.exporterType|kebab}"
      name: "{match.exporterType}"
