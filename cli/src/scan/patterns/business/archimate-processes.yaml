layer: business
framework: archimate-processes
version: "1.0"
patterns:
  - id: business.process.definition
    produces:
      type: node
      layer: business
      elementType: process
    query:
      tool: search_code
      params:
        pattern: '(?:process|workflow|flow):\s*([^#\n]+)'
        language: all
    confidence: 0.8
    mapping:
      id: "business.process.{match.processName|kebab}"
      name: "{match.processName}"

  - id: business.service.definition
    produces:
      type: node
      layer: business
      elementType: service
    query:
      tool: search_code
      params:
        pattern: '(?:service|capability):\s*([^#\n]+)'
        language: all
    confidence: 0.85
    mapping:
      id: "business.service.{match.serviceName|kebab}"
      name: "{match.serviceName}"

  - id: business.event.definition
    produces:
      type: node
      layer: business
      elementType: event
    query:
      tool: search_code
      params:
        pattern: '(?:event|trigger|when):\s*([^#\n]+)'
        language: all
    confidence: 0.75
    mapping:
      id: "business.event.{match.eventName|kebab}"
      name: "{match.eventName}"

  - id: business.role.definition
    produces:
      type: node
      layer: business
      elementType: role
    query:
      tool: search_code
      params:
        pattern: '(?:actor|role|agent):\s*([^#\n]+)'
        language: all
    confidence: 0.7
    mapping:
      id: "business.role.{match.roleName|kebab}"
      name: "{match.roleName}"

  - id: business.process.supported-by-service
    produces:
      type: relationship
      layer: business
      elementType: process-service
      relationshipType: supported-by
    query:
      tool: search_code
      params:
        pattern: '(?:process|workflow).*?(?:service|capability):\s*([^#\n]+)'
        language: all
    confidence: 0.85
    mapping:
      source: "business.process.*"
      target: "business.service.*"

  - id: business.event.triggers-process
    produces:
      type: relationship
      layer: business
      elementType: event-process
      relationshipType: triggers
    query:
      tool: search_code
      params:
        pattern: '(?:event|trigger).*?(?:process|workflow):\s*([^#\n]+)'
        language: all
    confidence: 0.8
    mapping:
      source: "business.event.*"
      target: "business.process.*"

  - id: business.role.performs-process
    produces:
      type: relationship
      layer: business
      elementType: role-process
      relationshipType: performs
    query:
      tool: search_code
      params:
        pattern: '(?:actor|role).*?(?:process|workflow):\s*([^#\n]+)'
        language: all
    confidence: 0.75
    mapping:
      source: "business.role.*"
      target: "business.process.*"
