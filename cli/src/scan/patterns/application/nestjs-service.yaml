# NestJS Application Layer Patterns
# Semantic pattern evolution using CodePrism's analyze_decorators and find_dependencies
layer: application
framework: nestjs-service
version: "2.0"
patterns:
  # Semantic pattern: Discover @Injectable services using analyze_decorators
  - id: nestjs.service.injectable
    produces:
      type: node
      layer: application
      elementType: service
    query:
      tool: analyze_decorators
      params:
        framework: nestjs
        language: typescript
        decoratorTypes: ["Injectable"]
        targetType: class
    requires_index: true
    confidence: 0.96
    mapping:
      id: "application.service.{match.className|kebab}"
      name: "{match.className}"
      description: "NestJS injectable service"

  # Regex fallback for services
  - id: nestjs.service.injectable.regex
    produces:
      type: node
      layer: application
      elementType: service
    query:
      tool: search_code
      params:
        pattern: "@Injectable\\(\\)\\s*export\\s*class\\s+(\\w+Service)"
        language: typescript
    confidence: 0.75
    mapping:
      id: "application.service.{match.className|kebab}"
      name: "{match.className}"

  # Semantic pattern: Discover service dependencies via AST dependency analysis
  - id: nestjs.service.dependency
    produces:
      type: relationship
      layer: application
      elementType: dependency
      relationshipType: depends-on
    query:
      tool: find_dependencies
      params:
        framework: nestjs
        language: typescript
        scope: constructor
    requires_index: true
    depends_on: ["nestjs.service.injectable"]
    confidence: 0.92
    mapping:
      source: "application.service.{match.source|kebab}"
      target: "application.service.{match.target|kebab}"

  # Regex fallback for dependencies
  - id: nestjs.service.dependency.regex
    produces:
      type: relationship
      layer: application
      elementType: dependency
      relationshipType: depends-on
    query:
      tool: search_code
      params:
        pattern: "constructor\\([^)]*private\\s+\\w+\\s*:\\s*([A-Za-z0-9]+)"
        language: typescript
    confidence: 0.68
    mapping:
      source: "application.service.{match.serviceName|kebab}"
      target: "application.service.{match.dependencyType|kebab}"

  # Semantic pattern: Discover public methods using search_symbols
  - id: nestjs.service.method
    produces:
      type: relationship
      layer: application
      elementType: method
      relationshipType: exposes
    query:
      tool: search_symbols
      params:
        framework: nestjs
        language: typescript
        symbolType: method
        visibility: public
    requires_index: true
    confidence: 0.85
    mapping:
      source: "application.service.{match.source|kebab}"
      target: "application.method.{match.methodName|kebab}"

  # Regex fallback for methods
  - id: nestjs.service.method.regex
    produces:
      type: relationship
      layer: application
      elementType: method
      relationshipType: exposes
    query:
      tool: search_code
      params:
        pattern: "public\\s+(async\\s+)?\\w+\\s*\\([^)]*\\)"
        language: typescript
    confidence: 0.60
    mapping:
      source: "application.service.{match.serviceName|kebab}"
      target: "application.method.{match.methodName|kebab}"

  # Regex pattern: Detect NestJS module providers
  - id: nestjs.module.provider
    produces:
      type: node
      layer: application
      elementType: component
    query:
      tool: search_code
      params:
        pattern: "providers\\s*:\\s*\\[[^\\]]*\\]"
        language: typescript
    confidence: 0.65
    mapping:
      id: "application.component.module-provider"
      name: "Module Provider"
      description: "NestJS module provider configuration"
