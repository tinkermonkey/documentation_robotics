name: "Element CRUD Operations"
description: "Test add, update, delete operations for elements across layers"
priority: high

pipelines:
  - name: "Add and update motivation goal"
    steps:
      - command: "add motivation goal test-goal --name 'Test Strategic Goal' --description 'Test goal for verification'"
        files_to_compare:
          - manifest.yaml
          - 01_motivation/goal.yaml
        expect_exit_code: 0
        expect_stdout_contains:
          - "Added"
          - "test-goal"

      - command: "update motivation.goal.test-goal --name 'Updated Strategic Goal'"
        files_to_compare:
          - 01_motivation/goal.yaml
        expect_exit_code: 0
        expect_stdout_contains:
          - "Updated"

      - command: "delete motivation.goal.test-goal --force"
        files_to_compare:
          - 01_motivation/goal.yaml
          - manifest.yaml
        expect_exit_code: 0
        expect_stdout_contains:
          - "Deleted"
          - "test-goal"

  - name: "Add application component lifecycle"
    steps:
      - command: "add application component test-component --name 'Test Component' --description 'Test application component'"
        files_to_compare:
          - manifest.yaml
          - 04_application/application_component.yaml
        expect_exit_code: 0
        expect_stdout_contains:
          - "Added"
          - "test-component"

      - command: "show application.applicationcomponent.test-component"
        files_to_compare: []
        expect_exit_code: 0
        expect_stdout_contains:
          - "test-component"
          - "Test Component"

      - command: "update application.applicationcomponent.test-component --name 'Updated Component'"
        files_to_compare:
          - 04_application/application_component.yaml
        expect_exit_code: 0

      - command: "delete application.applicationcomponent.test-component --force"
        files_to_compare:
          - manifest.yaml
          - 04_application/application_component.yaml
        expect_exit_code: 0

  - name: "Add API operation with update"
    steps:
      - command: 'add api operation test-operation --name ''Test Operation'' --description ''Test API operation'' --attributes ''{"operationId":"test-operation","summary":"Test Operation","tags":"test"}'''
        files_to_compare:
          - manifest.yaml
          - 06_api/operation.yaml
        expect_exit_code: 0
        expect_stdout_contains:
          - "Added"
          - "test-operation"

      - command: "update api.operation.test-operation --name 'Updated Operation'"
        files_to_compare:
          - 06_api/operation.yaml
        expect_exit_code: 0
        expect_stdout_contains:
          - "Updated"

      - command: "delete api.operation.test-operation --force"
        files_to_compare:
          - manifest.yaml
          - 06_api/operation.yaml
        expect_exit_code: 0
        expect_stdout_contains:
          - "Deleted"

  - name: "Add datastore collection with update"
    steps:
      - command: "add data-store collection test-table --name 'test_collection' --description 'Test collection'"
        files_to_compare:
          - manifest.yaml
          - 08_data-store/collection.yaml
        expect_exit_code: 0
        expect_stdout_contains:
          - "Added"
          - "test-table"

      - command: "update data-store.collection.test-table --name 'updated_collection'"
        files_to_compare:
          - 08_data-store/collection.yaml
        expect_exit_code: 0
        expect_stdout_contains:
          - "Updated"

      - command: "delete data-store.collection.test-table --force"
        files_to_compare:
          - manifest.yaml
          - 08_data-store/collection.yaml
        expect_exit_code: 0
        expect_stdout_contains:
          - "Deleted"

  - name: "Add testing test case sketch with update"
    steps:
      - command: "add testing testcasesketch test-case --name 'Test Case' --description 'Test case sketch for verification'"
        files_to_compare:
          - manifest.yaml
          - 12_testing/testcasesketch.yaml
        expect_exit_code: 0
        expect_stdout_contains:
          - "Added"
          - "test-case"

      - command: "update testing.testcasesketch.test-case --name 'Updated Test Case'"
        files_to_compare:
          - 12_testing/testcasesketch.yaml
        expect_exit_code: 0
        expect_stdout_contains:
          - "Updated"

      - command: "delete testing.testcasesketch.test-case --force"
        files_to_compare:
          - manifest.yaml
          - 12_testing/testcasesketch.yaml
        expect_exit_code: 0
        expect_stdout_contains:
          - "Deleted"
