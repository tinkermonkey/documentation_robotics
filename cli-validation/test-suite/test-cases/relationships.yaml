name: "Relationship Management"
description: "Test relationship creation, modification, and deletion operations"
priority: high

pipelines:
  - name: "Create and delete relationships"
    steps:
      - command: "add motivation goal rel-base-goal --name 'Baseline Goal' --description 'Goal for relationships'"
        files_to_compare:
          - manifest.yaml
          - 01_motivation/goal.yaml
        expect_exit_code: 0

      - command: "relationship list motivation.goal.rel-base-goal"
        files_to_compare: []
        expect_exit_code: 0

      - command: "add data-store collection rel-test-table --name 'test_collection' --description 'Collection for relationship test'"
        files_to_compare:
          - manifest.yaml
          - 08_data-store/collection.yaml
        expect_exit_code: 0

      - command: "add data-store field rel-test-column --name 'test_field' --description 'Field for relationship test'"
        files_to_compare:
          - manifest.yaml
          - 08_data-store/field.yaml
        expect_exit_code: 0

      - command: "relationship add data-store.collection.rel-test-table data-store.field.rel-test-column --predicate composes"
        files_to_compare:
          - relationships.yaml
        expect_exit_code: 0
        expect_stdout_contains:
          - "Added"

      - command: "relationship delete data-store.collection.rel-test-table data-store.field.rel-test-column --predicate composes"
        files_to_compare:
          - relationships.yaml
        expect_exit_code: 0
        expect_stdout_contains:
          - "Deleted"

      - command: "delete data-store.collection.rel-test-table --force"
        files_to_compare:
          - manifest.yaml
          - 08_data-store/collection.yaml
        expect_exit_code: 0

      - command: "delete data-store.field.rel-test-column --force"
        files_to_compare:
          - manifest.yaml
          - 08_data-store/field.yaml
        expect_exit_code: 0

      - command: "delete motivation.goal.rel-base-goal --force"
        files_to_compare:
          - manifest.yaml
          - 01_motivation/goal.yaml
        expect_exit_code: 0

  - name: "Multiple relationship types"
    steps:
      - command: "add data-store collection multi-rel-table --name 'multi_collection' --description 'Collection for multi-relationship test'"
        files_to_compare:
          - manifest.yaml
          - 08_data-store/collection.yaml
        expect_exit_code: 0

      - command: "add data-store field multi-rel-col-1 --name 'field_1' --description 'First field'"
        files_to_compare:
          - manifest.yaml
          - 08_data-store/field.yaml
        expect_exit_code: 0

      - command: "add data-store field multi-rel-col-2 --name 'field_2' --description 'Second field'"
        files_to_compare:
          - manifest.yaml
          - 08_data-store/field.yaml
        expect_exit_code: 0

      - command: "relationship add data-store.collection.multi-rel-table data-store.field.multi-rel-col-1 --predicate composes"
        files_to_compare:
          - relationships.yaml
        expect_exit_code: 0

      - command: "relationship add data-store.collection.multi-rel-table data-store.field.multi-rel-col-2 --predicate composes"
        files_to_compare:
          - relationships.yaml
        expect_exit_code: 0

      - command: "relationship list data-store.collection.multi-rel-table"
        files_to_compare: []
        expect_exit_code: 0

      - command: "delete data-store.collection.multi-rel-table --force"
        files_to_compare:
          - manifest.yaml
          - 08_data-store/collection.yaml
          - relationships.yaml
        expect_exit_code: 0

      - command: "delete data-store.field.multi-rel-col-1 --force"
        files_to_compare:
          - manifest.yaml
          - 08_data-store/field.yaml
        expect_exit_code: 0

      - command: "delete data-store.field.multi-rel-col-2 --force"
        files_to_compare:
          - manifest.yaml
          - 08_data-store/field.yaml
        expect_exit_code: 0

  - name: "Negative test: Cross-layer relationships not supported"
    description: "Verify that cross-layer relationships (higher→lower) are properly rejected or handled by the CLI"
    steps:
      - command: "add motivation goal cross-layer-goal --name 'Cross Layer Goal' --description 'Goal for cross-layer test'"
        files_to_compare:
          - manifest.yaml
          - 01_motivation/goal.yaml
        expect_exit_code: 0

      - command: "add business service cross-layer-service --name 'Cross Layer Service' --description 'Service for cross-layer test'"
        files_to_compare:
          - manifest.yaml
          - 02_business/business_service.yaml
        expect_exit_code: 0

      - command: "relationship add motivation.goal.cross-layer-goal business.businessservice.cross-layer-service --predicate realizes"
        files_to_compare: []
        expect_exit_code: 1
        expect_stderr_contains:
          - "Invalid relationship:"

      - command: "delete motivation.goal.cross-layer-goal --force"
        files_to_compare:
          - manifest.yaml
          - 01_motivation/goal.yaml
        expect_exit_code: 0

      - command: "delete business.businessservice.cross-layer-service --force"
        files_to_compare:
          - manifest.yaml
          - 02_business/business_service.yaml
        expect_exit_code: 0
